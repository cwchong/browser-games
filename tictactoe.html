<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 { font-size: 2rem; letter-spacing: 2px; color: #e94560; }

    #status {
      font-size: 1.2rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 6px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.05); }
    .cell.taken { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; border-color: #e94560; animation: pulse 0.4s ease; }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #score {
      display: flex;
      gap: 32px;
      font-size: 1rem;
      color: #ccc;
    }

    .score-box { text-align: center; }
    .score-box span { display: block; font-size: 1.8rem; font-weight: bold; }
    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #aaa; }

    #restart {
      padding: 10px 28px;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #restart:hover { background: #e94560; color: #fff; }

    #mode-toggle {
      display: flex;
      gap: 12px;
    }

    .mode-btn {
      padding: 8px 20px;
      border: 2px solid #0f3460;
      background: #16213e;
      color: #aaa;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mode-btn.active {
      border-color: #a8dadc;
      color: #a8dadc;
      background: #0f3460;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="mode-toggle">
    <button class="mode-btn active" data-mode="2p">2 Players</button>
    <button class="mode-btn" data-mode="ai">vs CPU</button>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="score">
    <div class="score-box x-score"><label>X</label><span id="sx">0</span></div>
    <div class="score-box draw-score"><label>Draw</label><span id="sd">0</span></div>
    <div class="score-box o-score"><label>O</label><span id="so">0</span></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, over, mode, score;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      render();
    }

    function checkWinner(b) {
      for (const [a, c, d] of WINS) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a, c, d] };
      }
      if (b.every(Boolean)) return { winner: 'draw' };
      return null;
    }

    function minimax(b, isMax) {
      const res = checkWinner(b);
      if (res) return res.winner === 'O' ? 10 : res.winner === 'X' ? -10 : 0;
      let best = isMax ? -Infinity : Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = isMax ? 'O' : 'X';
          const val = minimax(b, !isMax);
          b[i] = null;
          best = isMax ? Math.max(best, val) : Math.min(best, val);
        }
      }
      return best;
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const val = minimax(board, false);
          board[i] = null;
          if (val > best) { best = val; move = i; }
        }
      }
      return move;
    }

    function play(i) {
      if (over || board[i]) return;
      board[i] = current;
      const result = checkWinner(board);
      if (result) {
        over = true;
        if (result.winner === 'draw') {
          score.d++;
          setStatus("It's a draw!");
        } else {
          score[result.winner]++;
          setStatus(`${result.winner} wins!`);
          result.line.forEach(idx => cells[idx].classList.add('win'));
        }
        updateScore();
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`${current}'s turn`);
        if (mode === 'ai' && current === 'O') {
          setTimeout(() => { play(bestMove()); }, 300);
        }
      }
      render();
    }

    function render() {
      cells.forEach((cell, i) => {
        cell.textContent = board[i] || '';
        cell.className = 'cell' + (board[i] ? ` taken ${board[i].toLowerCase()}` : '');
      });
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function updateScore() {
      document.getElementById('sx').textContent = score.X;
      document.getElementById('so').textContent = score.O;
      document.getElementById('sd').textContent = score.d;
    }

    const cells = [...document.querySelectorAll('.cell')];
    cells.forEach(cell => cell.addEventListener('click', () => play(+cell.dataset.i)));

    document.getElementById('restart').addEventListener('click', init);

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        score = { X: 0, O: 0, d: 0 };
        updateScore();
        init();
      });
    });

    mode = '2p';
    score = { X: 0, O: 0, d: 0 };
    init();
  </script>
</body>
</html>
